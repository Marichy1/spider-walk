<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蜘蜘 · 博客编辑器</title>
    <style>
        /* ========== 全局风格 —— 完全继承 INDEX 的冷酷复古感 ========== */
        :root {
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --gray-95: #F2F2F2;
            --gray-85: #D9D9D9;
            --gray-65: #A6A6A6;
            --font-mono: "Courier New", Courier, "Liberation Mono", "Consolas", "Noto Sans Mono", monospace;
            --shadow-heavy: 8px 8px 0 rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--gray-95);
            color: var(--pure-black);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 42px;
            background-color: var(--pure-white);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            border-bottom: 2px solid var(--pure-black);
        }

        #top-bar .title {
            font-size: 26px;
            font-weight: bold;
            color: var(--pure-black);
            letter-spacing: 0.5px;
        }

        #main-container {
            max-width: 700px;
            margin: 64px auto 40px;
            padding: 20px;
            background-color: var(--pure-white);
            border: 2px solid var(--pure-black);
            box-shadow: var(--shadow-heavy);
            transition: all 0.1s ease;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--pure-black);
            padding-bottom: 8px;
            font-weight: bold;
        }

        #toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            align-items: center;
            border-bottom: 1px dashed var(--gray-65);
            padding-bottom: 16px;
        }

        .tool-btn {
            background: var(--pure-white);
            border: 2px solid var(--pure-black);
            color: var(--pure-black);
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            transition: 0.05s linear;
        }

        .tool-btn:active {
            background: var(--gray-85);
            transform: translate(1px, 1px);
        }

        .tool-btn.active {
            background: var(--pure-black);
            color: var(--pure-white);
            border-color: var(--pure-black);
        }

        .tool-sep {
            width: 2px;
            height: 26px;
            background: var(--gray-65);
            margin: 0 6px;
        }

        #font-size-select {
            padding: 8px 8px;
            font-family: var(--font-mono);
            font-size: 14px;
            border: 2px solid var(--pure-black);
            border-radius: 4px;
            background: var(--pure-white);
            cursor: pointer;
            height: 44px;
            min-width: 75px;
            font-weight: bold;
        }

        #font-size-select:focus {
            outline: none;
            background: var(--gray-95);
        }

        #title-input {
            width: 100%;
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: bold;
            padding: 12px 14px;
            border: 2px solid var(--pure-black);
            border-radius: 4px;
            background: var(--pure-white);
            margin-bottom: 20px;
            outline: none;
            transition: 0.1s;
        }

        #title-input:focus {
            background: var(--gray-95);
            border-color: var(--pure-black);
        }

        #editor-area {
            position: relative;
            min-height: 340px;
        }

        #editor {
            width: 100%;
            min-height: 360px;
            border: 1px dashed var(--gray-65);
            padding: 16px;
            outline: none;
            font-family: var(--font-mono);
            font-size: 15px;
            line-height: 1.7;
            background: var(--pure-white);
            word-break: break-word;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #preview {
            display: none;
            width: 100%;
            min-height: 360px;
            padding: 16px;
            font-size: 15px;
            line-height: 1.7;
            border: 1px solid var(--gray-85);
            background: var(--pure-white);
            word-break: break-word;
        }

        #editor hr,
        #preview hr {
            border: none;
            border-top: 2px solid var(--pure-black);
            margin: 20px 0;
            position: relative;
        }

        #editor hr::after {
            content: ' ✦ 分割线 ✦ ';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--pure-white);
            padding: 0 12px;
            font-size: 12px;
            color: var(--gray-65);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        #editor blockquote,
        #preview blockquote {
            border-left: 4px solid var(--pure-black);
            margin: 12px 0;
            padding: 10px 16px;
            background: var(--gray-95);
            font-style: normal;
            color: var(--pure-black);
        }

        #editor pre,
        #preview pre {
            background: var(--gray-95);
            border: 1px solid var(--gray-65);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 13.5px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 12px 0;
        }

        #editor ul, #editor ol {
            padding-left: 1.8rem;
            margin: 8px 0;
        }

        #editor a, #preview a {
            color: var(--pure-black);
            text-decoration: underline;
            font-weight: 500;
        }

        #editor a:active, #preview a:active {
            opacity: 0.7;
        }

        #preview .preview-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--pure-black);
            font-family: var(--font-mono);
        }

        .mode-indicator {
            font-size: 12px;
            color: var(--gray-65);
            margin-bottom: 12px;
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
            border-left: 3px solid var(--pure-black);
            padding-left: 10px;
        }

        #btn-export, #btn-upload-html {
            margin-top: 12px;
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: bold;
            background: var(--pure-white);
            transition: 0.08s linear;
        }

        #btn-export:active, #btn-upload-html:active {
            background: var(--gray-85);
            transform: translate(1px, 1px);
        }

        .fullscreen #main-container {
            max-width: 100%;
            margin: 0;
            padding: 20px;
            border: none;
            box-shadow: none;
            position: fixed;
            top: 42px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            background: var(--pure-white);
        }

        .fullscreen #editor {
            min-height: 55vh;
        }

        @media (max-width: 560px) {
            .tool-btn {
                font-size: 13px;
                padding: 6px 10px;
                min-height: 40px;
                min-width: 40px;
            }
            #main-container {
                margin-left: 12px;
                margin-right: 12px;
                padding: 18px;
            }
            #title-input {
                font-size: 17px;
                padding: 10px;
            }
            #top-bar .title {
                font-size: 22px;
            }
            h1 {
                font-size: 20px;
            }
        }

        #editor:focus {
            outline: none;
        }

        #toolbar button, #toolbar select {
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <span class="title">蜘蜘</span>
</div>

<div id="main-container">
    <h1>✎ 博客编辑器</h1>
    <div id="toolbar">
        <button class="tool-btn" id="btn-undo" title="撤销">↩ 撤销</button>
        <button class="tool-btn" id="btn-redo" title="重做">↪ 重做</button>
        <span class="tool-sep"></span>
        <button class="tool-btn format-btn" data-format="bold" title="加粗"><b>B</b></button>
        <button class="tool-btn format-btn" data-format="italic" title="斜体"><i>I</i></button>
        <button class="tool-btn format-btn" data-format="strike" title="删除线"><s>S</s></button>
        <span class="tool-sep"></span>
        <select id="font-size-select" title="字体大小">
            <option value="1">12px</option>
            <option value="2">14px</option>
            <option value="3" selected>16px</option>
            <option value="4">20px</option>
            <option value="5">24px</option>
            <option value="6">28px</option>
            <option value="7">32px</option>
        </select>
        <button class="tool-btn format-btn" data-format="ul" title="无序列表">• 列表</button>
        <button class="tool-btn format-btn" data-format="ol" title="有序列表">1. 列表</button>
        <button class="tool-btn format-btn" data-format="quote" title="引用">“ 引用</button>
        <button class="tool-btn format-btn" data-format="code" title="代码">&lt;/&gt; 代码</button>
        <button class="tool-btn" id="btn-hr" title="分割线">— 分割线</button>
        <button class="tool-btn" id="btn-link" title="插入链接">🔗 链接</button>
        <span class="tool-sep"></span>
        <button class="tool-btn" id="btn-fullscreen" title="全屏模式">📱 全屏</button>
        <button class="tool-btn" id="btn-preview" title="预览模式">👁 预览</button>
    </div>

    <input type="text" id="title-input" placeholder="输入博客标题…" value="比如：「蜘蜘漫游奇遇」" />

    <div class="mode-indicator" id="mode-indicator">✎ 编辑模式 · 点击格式按钮即锁定格式</div>

    <div id="editor-area">
        <div id="editor" contenteditable="true">
            <p>✦ 在这里开始书写你的篇章 ✦</p>
            <p>点击工具栏的 <strong>B / I / S</strong> 会<strong style="background: #F2F2F2;">锁定格式</strong>，之后输入的文字会自动应用该样式。<br>再次点击按钮即可取消锁定，光标在哪格式就跟着哪。</p>
            <hr>
            <p>试试 <strong>加粗</strong>、<em>斜体</em>、<s>删除线</s>，或者创建有趣的无序列表：</p>
            <ul>
                <li>蜘蜘的冒险笔记</li>
                <li>老派互联网角落</li>
                <li>灰白复古美学</li>
            </ul>
            <p>也可以引用一段话：</p>
            <blockquote>「蜘蜘从洞穴向外张望，每一次随机漫游都通往意想不到的站点。」</blockquote>
            <p>甚至放进一段代码：</p>
            <pre>console.log("hello, 蜘蜘风格编辑器");</pre>
        </div>
        <div id="preview"></div>
    </div>

    <!-- 上传按钮 + 导出按钮 -->
    <button class="tool-btn" id="btn-upload-html">📂 上传 HTML 文件并编辑</button>
    <button class="tool-btn" id="btn-export">💾 导出 HTML 文件</button>
</div>

<script>
    (function() {
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const titleInput = document.getElementById('title-input');
        const btnPreview = document.getElementById('btn-preview');
        const modeIndicator = document.getElementById('mode-indicator');
        const fontSizeSelect = document.getElementById('font-size-select');
        const btnHr = document.getElementById('btn-hr');
        const btnLink = document.getElementById('btn-link');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnExport = document.getElementById('btn-export');
        const btnUpload = document.getElementById('btn-upload-html');
        const mainContainer = document.getElementById('main-container');
        const formatBtns = document.querySelectorAll('.format-btn');

        let isPreview = false;
        let isFullscreen = false;

        // 锁定格式状态池 (块级/内联)
        const activeFormats = {
            bold: false,
            italic: false,
            strike: false,
            ul: false,
            ol: false,
            quote: false,
            code: false
        };

        // 根据当前光标同步按钮高亮
        function syncFormatsFromSelection() {
            if (isPreview || !editor.contains(document.activeElement)) return;

            activeFormats.bold = document.queryCommandState('bold');
            activeFormats.italic = document.queryCommandState('italic');
            activeFormats.strike = document.queryCommandState('strikeThrough');

            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                let node = sel.getRangeAt(0).commonAncestorContainer;
                let inUL = false, inOL = false, inBlockquote = false, inPre = false;
                let temp = node;
                while (temp && temp !== editor) {
                    if (temp.nodeType === 1) {
                        if (temp.tagName === 'UL') inUL = true;
                        if (temp.tagName === 'OL') inOL = true;
                        if (temp.tagName === 'BLOCKQUOTE') inBlockquote = true;
                        if (temp.tagName === 'PRE') inPre = true;
                    }
                    temp = temp.parentElement;
                }
                activeFormats.ul = inUL;
                activeFormats.ol = inOL;
                activeFormats.quote = inBlockquote;
                activeFormats.code = inPre;
                if (activeFormats.ul && activeFormats.ol) activeFormats.ol = false;
                if (activeFormats.quote && activeFormats.code) activeFormats.code = false;
            } else {
                if (!activeFormats.ul && !activeFormats.ol) activeFormats.ul = activeFormats.ol = false;
                if (!activeFormats.quote) activeFormats.code = false;
                if (!activeFormats.code) activeFormats.quote = false;
            }
            updateFormatButtons();
        }

        function clearAllFormats() {
            for (let key in activeFormats) activeFormats[key] = false;
            updateFormatButtons();
        }

        function toggleFormat(key) {
            const blockKeys = ['ul', 'ol', 'quote', 'code'];
            if (blockKeys.includes(key)) {
                blockKeys.forEach(k => { if (k !== key) activeFormats[k] = false; });
            }
            activeFormats[key] = !activeFormats[key];
            updateFormatButtons();
            editor.focus();
            applyCurrentFormatLock();
        }

        function updateFormatButtons() {
            formatBtns.forEach(btn => {
                const fmt = btn.dataset.format;
                if (fmt && activeFormats[fmt] !== undefined) {
                    btn.classList.toggle('active', activeFormats[fmt] === true);
                }
            });
        }

        function applyCurrentFormatLock() {
            function setCmd(cmd, state) {
                const curState = document.queryCommandState(cmd);
                if (curState !== state) {
                    document.execCommand(cmd, false, null);
                }
            }
            setCmd('bold', activeFormats.bold);
            setCmd('italic', activeFormats.italic);
            setCmd('strikeThrough', activeFormats.strike);
            setCmd('insertUnorderedList', activeFormats.ul);
            setCmd('insertOrderedList', activeFormats.ol);

            const currentBlock = getCurrentBlockElement();
            const needQuote = activeFormats.quote;
            const needCode = activeFormats.code;

            if (needQuote) {
                if (currentBlock && currentBlock.tagName !== 'BLOCKQUOTE') {
                    document.execCommand('formatBlock', false, 'blockquote');
                } else if (!needQuote && currentBlock && currentBlock.tagName === 'BLOCKQUOTE') {
                    document.execCommand('formatBlock', false, 'p');
                }
            } else if (needCode) {
                if (currentBlock && currentBlock.tagName !== 'PRE') {
                    document.execCommand('formatBlock', false, 'pre');
                } else if (!needCode && currentBlock && currentBlock.tagName === 'PRE') {
                    document.execCommand('formatBlock', false, 'p');
                }
            } else {
                if (currentBlock && (currentBlock.tagName === 'BLOCKQUOTE' || currentBlock.tagName === 'PRE')) {
                    document.execCommand('formatBlock', false, 'p');
                }
            }
        }

        function getCurrentBlockElement() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return null;
            let node = sel.getRangeAt(0).commonAncestorContainer;
            while (node && node !== editor) {
                if (node.nodeType === 1 && ['BLOCKQUOTE', 'PRE', 'P', 'LI', 'UL', 'OL'].includes(node.tagName)) {
                    return node;
                }
                node = node.parentElement;
            }
            return null;
        }

        document.getElementById('toolbar').addEventListener('mousedown', function(e) {
            if (e.target.closest('button') || e.target.closest('select')) {
                e.preventDefault();
            }
        });

        editor.addEventListener('focus', () => { syncFormatsFromSelection(); });
        document.addEventListener('selectionchange', () => {
            if (editor.contains(document.activeElement)) syncFormatsFromSelection();
        });

        formatBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                toggleFormat(btn.dataset.format);
            });
        });

        fontSizeSelect.addEventListener('change', () => {
            editor.focus();
            document.execCommand('fontSize', false, fontSizeSelect.value);
            syncFormatsFromSelection();
        });

        btnHr.addEventListener('click', () => {
            editor.focus();
            document.execCommand('insertHorizontalRule');
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.collapse(false);
                const br = document.createElement('p');
                br.innerHTML = '<br>';
                range.insertNode(br);
                range.setStartAfter(br);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            syncFormatsFromSelection();
        });

        btnLink.addEventListener('click', () => {
            editor.focus();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            const selectedText = range.toString().trim();
            let url = prompt('请输入链接地址 (带上 http:// 或 https://)', 'https://');
            if (url) {
                if (!selectedText) {
                    let displayText = prompt('链接显示文字', url) || url;
                    const textNode = document.createTextNode(displayText);
                    range.deleteContents();
                    range.insertNode(textNode);
                    range.selectNodeContents(textNode);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
                document.execCommand('createLink', false, url);
            }
            syncFormatsFromSelection();
        });

        btnUndo.addEventListener('click', () => { editor.focus(); document.execCommand('undo'); syncFormatsFromSelection(); });
        btnRedo.addEventListener('click', () => { editor.focus(); document.execCommand('redo'); syncFormatsFromSelection(); });

        btnPreview.addEventListener('click', () => {
            if (isPreview) {
                editor.style.display = 'block';
                preview.style.display = 'none';
                titleInput.style.display = 'block';
                btnPreview.textContent = '👁 预览';
                modeIndicator.textContent = '✎ 编辑模式 · 点击格式按钮即锁定格式';
                isPreview = false;
            } else {
                const title = titleInput.value.trim() || '无标题博客';
                preview.innerHTML = `<div class="preview-title">${escapeHtml(title)}</div>` + editor.innerHTML;
                editor.style.display = 'none';
                preview.style.display = 'block';
                titleInput.style.display = 'none';
                btnPreview.textContent = '✏️ 编辑';
                modeIndicator.textContent = '◆ 预览模式 · 所见即所得';
                isPreview = true;
            }
        });

        btnFullscreen.addEventListener('click', () => {
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                mainContainer.classList.add('fullscreen');
                btnFullscreen.textContent = '📱 退出全屏';
            } else {
                mainContainer.classList.remove('fullscreen');
                btnFullscreen.textContent = '📱 全屏';
            }
        });

        // ---------- 导出 HTML：完全复刻 index 风格，无额外页脚，且标题不包含“蜘蜘手札” ----------
        function buildIndexStyleBlog() {
            const blogTitleRaw = titleInput.value.trim() || '无标题';
            const blogTitle = escapeHtml(blogTitleRaw);
            const blogContent = editor.innerHTML;
            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${blogTitle}</title>
    <style>
        :root {
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --gray-95: #F2F2F2;
            --gray-85: #D9D9D9;
            --gray-65: #A6A6A6;
            --font-mono: "Courier New", Courier, "Liberation Mono", "Consolas", "Noto Sans Mono", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-mono);
            background-color: var(--gray-95);
            color: var(--pure-black);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 42px;
            background-color: var(--pure-white);
            display: flex; align-items: center; padding: 0 20px; z-index: 100;
            border-bottom: 2px solid var(--pure-black);
        }
        #top-bar .title { font-size: 26px; font-weight: bold; color: var(--pure-black); }
        #content {
            max-width: 700px;
            margin: 64px auto 40px;
            padding: 24px;
            background-color: var(--pure-white);
            border: 2px solid var(--pure-black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }
        .blog-header h1 {
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--pure-black);
            padding-bottom: 8px;
            font-weight: bold;
        }
        .blog-body {
            font-size: 15px;
            line-height: 1.7;
        }
        .blog-body hr {
            border: none;
            border-top: 2px solid var(--pure-black);
            margin: 24px 0;
        }
        .blog-body blockquote {
            border-left: 4px solid var(--pure-black);
            margin: 12px 0;
            padding: 10px 16px;
            background: var(--gray-95);
        }
        .blog-body pre {
            background: var(--gray-95);
            border: 1px solid var(--gray-65);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 12px 0;
        }
        .blog-body ul, .blog-body ol {
            padding-left: 1.8rem;
            margin: 8px 0;
        }
        .blog-body a {
            color: var(--pure-black);
            text-decoration: underline;
        }
        .blog-body p {
            margin: 0.8em 0;
        }
        @media (max-width: 560px) {
            #content { margin: 60px 16px 30px; padding: 18px; }
            #top-bar .title { font-size: 22px; }
            .blog-header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div id="top-bar">
    <span class="title">蜘蜘</span>
</div>
<div id="content">
    <div class="blog-header">
        <h1>${blogTitle}</h1>
    </div>
    <div class="blog-body">
        ${blogContent}
    </div>
</div>
</body>
</html>`;
        }

        btnExport.addEventListener('click', () => {
            const fullHtml = buildIndexStyleBlog();
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const titleForFile = (titleInput.value.trim() || '无标题').replace(/[\\/:*?"<>|]/g, '');
            a.download = `${titleForFile}.html`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        });

        // ---------- 上传 HTML 并解析，填充至编辑器 ----------
        function extractTitleAndBodyFromHtml(htmlString, fallbackFilename) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            // 1. 提取标题: 优先 <title>，其次 <h1>，最后使用文件名
            let pageTitle = '';
            const titleTag = doc.querySelector('title');
            if (titleTag && titleTag.textContent.trim()) {
                pageTitle = titleTag.textContent.trim();
            } else {
                const firstH1 = doc.querySelector('h1');
                if (firstH1) pageTitle = firstH1.textContent.trim();
                else pageTitle = fallbackFilename.replace(/\.html?$/i, '') || '上传的页面';
            }
            
            // 2. 提取正文内容: 优先匹配标准蜘蜘导出格式 / 常见文章容器
            let contentHtml = '';
            // 优先找 #content .blog-body (蜘蜘导出风格)
            const spiderBody = doc.querySelector('#content .blog-body');
            if (spiderBody) {
                contentHtml = spiderBody.innerHTML;
            } else {
                // 尝试 #content 主体
                const contentDiv = doc.querySelector('#content');
                if (contentDiv) {
                    // 移除其中的 .blog-header 避免重复标题
                    const cloneContent = contentDiv.cloneNode(true);
                    const headerInside = cloneContent.querySelector('.blog-header');
                    if (headerInside) headerInside.remove();
                    contentHtml = cloneContent.innerHTML;
                } else {
                    // 通用文章区域: article, main, .post-body, .entry-content
                    let mainArea = doc.querySelector('article, main, .post-body, .entry-content, .blog-body');
                    if (mainArea) {
                        contentHtml = mainArea.innerHTML;
                    } else {
                        // 最终回退: 取 body 内容，但过滤掉 nav/header/footer/script/style
                        const body = doc.body;
                        if (body) {
                            const container = doc.createElement('div');
                            for (let node of body.childNodes) {
                                if (node.nodeType === Node.ELEMENT_NODE) {
                                    const tag = node.tagName.toLowerCase();
                                    if (['script', 'style', 'nav', 'header', 'footer', 'aside'].includes(tag)) continue;
                                    if (node.id === 'top-bar') continue;  // 蜘蜘导航栏跳过
                                    container.appendChild(node.cloneNode(true));
                                } else if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                                    container.appendChild(node.cloneNode(true));
                                }
                            }
                            contentHtml = container.innerHTML;
                        } else {
                            contentHtml = '<p>无法解析页面主体内容，请手动编辑。</p>';
                        }
                    }
                }
            }
            
            // 清理可能残留的脚本、内联事件
            const sanitized = sanitizeHtmlFragment(contentHtml);
            return { title: pageTitle, body: sanitized };
        }
        
        function sanitizeHtmlFragment(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            const scripts = div.querySelectorAll('script, iframe, object, embed, form');
            scripts.forEach(el => el.remove());
            const allElements = div.querySelectorAll('*');
            allElements.forEach(el => {
                for (let attr of el.attributes) {
                    if (attr.name.startsWith('on')) {
                        el.removeAttribute(attr.name);
                    }
                    if (attr.name === 'href' && attr.value.trim().toLowerCase().startsWith('javascript:')) {
                        el.removeAttribute('href');
                    }
                }
            });
            return div.innerHTML;
        }
        
        function uploadAndEdit() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.html,.htm';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const htmlContent = ev.target.result;
                        const { title, body } = extractTitleAndBodyFromHtml(htmlContent, file.name);
                        // 填入编辑器
                        titleInput.value = title;
                        editor.innerHTML = body || '<p>上传的内容为空。</p>';
                        if (isPreview) {
                            btnPreview.click();
                        }
                        clearAllFormats();
                        modeIndicator.textContent = '✓ 已载入页面 · 现在可以编辑了';
                        setTimeout(() => {
                            if (!isPreview) modeIndicator.textContent = '✎ 编辑模式 · 点击格式按钮即锁定格式';
                        }, 2000);
                        editor.focus();
                        syncFormatsFromSelection();
                    } catch (err) {
                        alert('解析文件出错：' + err.message);
                    }
                };
                reader.onerror = () => alert('文件读取失败');
                reader.readAsText(file, 'UTF-8');
            };
            input.click();
        }
        
        btnUpload.addEventListener('click', uploadAndEdit);
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        titleInput.addEventListener('focus', () => { clearAllFormats(); });
        editor.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' && !isPreview) e.preventDefault();
            syncFormatsFromSelection();
        });
        
        syncFormatsFromSelection();
        editor.focus();
    })();
</script>
</body>
</html>
